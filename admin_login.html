<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>دخول الأدمن</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#1a1208;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#fff;
}

.box {
  background:#2a1f0e;
  padding:30px;
  border-radius:12px;
  width:300px;
  text-align:center;
}

input {
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:8px;
}

button {
  width:100%;
  padding:10px;
  background:#b8964e;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}
</style>

</head>

<body>

<div class="box">
  <h2>🔐 دخول الأدمن</h2>
  <input type="password" id="pass" placeholder="كلمة السر">
  <button onclick="login()">دخول</button>
  <p id="msg"></p>
</div>

<script>
function login(){
  const pass = document.getElementById('pass').value;

  if(pass === "1234"){
    window.location.href = "admin_dashboard.html";
  } else {
    document.getElementById('msg').innerText = "❌ كلمة السر غلط";
  }
}
</script>

</body>
</html>
